<div class="auth-container">
  <h2>{{ isRegister ? 'Регистрация' : 'Вход' }}</h2>

  <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>

  <input [(ngModel)]="username" placeholder="Логин" type="text" />

  @if (isRegister) {
    <input [(ngModel)]="email" placeholder="Email" type="email" />
  }

  <input [(ngModel)]="password" placeholder="Пароль" type="password" />

  @if (isRegister) {
    <select [(ngModel)]="selectedRole">
      <option value="buyer">Покупатель</option>
      <option value="seller">Продавец</option>
    </select>
  }

  <button (click)="isRegister ? register() : login()">
    {{ isRegister ? 'Зарегистрироваться' : 'Войти' }}
  </button>

  <p (click)="toggleMode()" class="toggle-link">
    {{ isRegister ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Зарегистрироваться' }}
  </p>
</div>
