<div class="auth-container">
  <div style="text-align:right; margin-bottom:8px">
    <button (click)="tr.toggle()" style="background:#eee;color:#333;font-size:13px;padding:4px 10px">
      {{ tr.currentLang() === 'ru' ? 'EN' : 'RU' }}
    </button>
  </div>

  <h2>{{ isRegister ? tr.t('register') : tr.t('sign_in') }}</h2>

  @if (errorMessage) {
    <div class="error">{{ errorMessage }}</div>
  }

  <input [(ngModel)]="username" [placeholder]="tr.t('username')" type="text" />

  @if (isRegister) {
    <input [(ngModel)]="email" [placeholder]="tr.t('email')" type="email" />
  }

  <input [(ngModel)]="password" [placeholder]="tr.t('password')" type="password" />

  @if (isRegister) {
    <select [(ngModel)]="selectedRole">
      <option value="buyer">{{ tr.t('buyer') }}</option>
      <option value="seller">{{ tr.t('seller_role') }}</option>
    </select>
  }

  <button (click)="isRegister ? register() : login()">
    {{ isRegister ? tr.t('register_btn') : tr.t('sign_in_btn') }}
  </button>

  <p (click)="toggleMode()" class="toggle-link">
    {{ isRegister ? tr.t('have_account') : tr.t('no_account') }}
  </p>
</div>
